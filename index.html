<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zengzhixuan's blog</title>
    <style>
        /* 全局重置和基础设置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            line-height: 1.6;
            padding: 30px;
        }

        /* 整个页面的容器 - 超大圆角 */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 48px;  /* 更大的圆角 */
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.06);
            padding: 40px 50px;
        }

        /* ---------- 顶部导航 ---------- */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 24px;
            border-bottom: 1px solid #f0f2f5;
            flex-wrap: wrap;
        }

        .logo a {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a2e;
            text-decoration: none;
            letter-spacing: -0.3px;
        }

        .logo a:hover {
            color: #4a6cf7;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 32px;
        }

        .nav-links a {
            text-decoration: none;
            color: #555;
            font-weight: 500;
            font-size: 15px;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #4a6cf7;
        }

        /* ---------- 博客头部 ---------- */
        .blog-header {
            text-align: center;
            padding: 50px 0 40px;
        }

        .blog-header h1 {
            font-size: 38px;
            color: #1a1a2e;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .blog-header p {
            color: #888;
            font-size: 18px;
            letter-spacing: 0.5px;
        }

        /* ---------- 主体：两栏布局 ---------- */
        .main-content {
            display: flex;
            gap: 48px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .posts {
            flex: 2;
            min-width: 280px;
        }

        .sidebar {
            flex: 1;
            min-width: 220px;
        }

        /* ---------- 空状态：暂无文章 ---------- */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: #fafbff;
            border-radius: 32px;
            border: 2px dashed #e0e4ed;
        }

        .empty-state .empty-icon {
            font-size: 56px;
            margin-bottom: 16px;
            display: block;
        }

        .empty-state h2 {
            font-size: 22px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .empty-state p {
            color: #999;
            font-size: 15px;
        }

        /* ---------- 侧边栏 ---------- */
        .sidebar-widget {
            background: #fafbff;
            border-radius: 24px;
            padding: 22px 26px;
            margin-bottom: 28px;
        }

        .sidebar-widget h3 {
            font-size: 17px;
            color: #1a1a2e;
            margin-bottom: 14px;
            padding-left: 14px;
            border-left: 4px solid #4a6cf7;
        }

        .sidebar-widget ul {
            list-style: none;
            padding-left: 0;
        }

        .sidebar-widget ul li {
            margin-bottom: 8px;
        }

        .sidebar-widget ul li a {
            text-decoration: none;
            color: #4a5568;
            transition: color 0.2s;
        }

        .sidebar-widget ul li a:hover {
            color: #4a6cf7;
        }

        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag-cloud a {
            background: #eef1f8;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 13px;
            color: #4a5568;
            text-decoration: none;
            transition: 0.2s;
        }

        .tag-cloud a:hover {
            background: #4a6cf7;
            color: #fff;
        }

        /* ---------- 页脚 ---------- */
        .footer {
            margin-top: 40px;
            padding-top: 28px;
            border-top: 1px solid #f0f2f5;
            text-align: center;
            color: #aaa;
            font-size: 14px;
        }

        .footer a {
            color: #4a6cf7;
            text-decoration: none;
        }

        /* 响应式优化 */
        @media (max-width: 700px) {
            body {
                padding: 16px;
            }
            .container {
                padding: 24px 20px;
                border-radius: 32px;
            }
            .navbar {
                flex-direction: column;
                align-items: flex-start;
                gap: 14px;
            }
            .nav-links {
                gap: 22px;
                flex-wrap: wrap;
            }
            .blog-header h1 {
                font-size: 28px;
            }
            .blog-header {
                padding: 30px 0 24px;
            }
            .empty-state {
                padding: 40px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- ========== 顶部导航 ========== -->
        <nav class="navbar">
            <div class="logo">
                <a href="#">zengzhixuan's blog</a>
            </div>
            <ul class="nav-links">
                <li><a href="#">首页</a></li>
                <li><a href="#">归档</a></li>
                <li><a href="#">关于</a></li>
            </ul>
        </nav>

        <!-- ========== 博客头部 ========== -->
        <header class="blog-header">
            <h1>📝 zengzhixuan's blog</h1>
            <p>记录技术、生活与思考</p>
        </header>

        <!-- ========== 主体内容 ========== -->
        <div class="main-content">

            <!-- 左侧：文章列表（目前为空） -->
            <section class="posts">
                <!-- 空状态提示 -->
                <div class="empty-state">
                    <span class="empty-icon">📂</span>
                    <h2>还没有文章</h2>
                    <p>第一篇博客正在路上，敬请期待……</p>
                </div>
            </section>

            <!-- 右侧：侧边栏 -->
            <aside class="sidebar">

                <!-- 关于我 -->
                <div class="sidebar-widget">
                    <h3>👤 关于我</h3>
                    <p style="font-size: 14px; color: #4a5568;">
                        一个热爱技术、写作与分享的开发者。目前专注于 Web 全栈和开源社区。
                    </p>
                </div>

                <!-- 近期文章 -->
                <div class="sidebar-widget">
                    <h3>📖 近期文章</h3>
                    <ul>
                        <li><a href="#">暂无文章</a></li>
                    </ul>
                </div>

                <!-- 标签云 -->
                <div class="sidebar-widget">
                    <h3>🏷️ 标签云</h3>
                    <div class="tag-cloud">
                        <a href="#">技术</a>
                        <a href="#">前端</a>
                        <a href="#">成长</a>
                        <a href="#">生活</a>
                        <a href="#">Python</a>
                        <a href="#">Git</a>
                        <a href="#">写作</a>
                    </div>
                </div>

            </aside>

        </div>

        <!-- ========== 页脚 ========== -->
        <footer class="footer">
            <p>© 2026 zengzhixuan's Blog · 由 <a href="#">GitHub Pages</a> 驱动</p>
        </footer>

    </div>
</body>
</html>
